[workspace]
authors = ["jstgermainsensortech <jstgermain@sensortechcanada.com>"]
channels = ["conda-forge"]
name = "inference_matpac"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.9.18,<3.11"

[pypi-dependencies]
matpac = { path = ".", editable = true }
pandas = "<3"
librosa = ">=0.11.0, <0.12"
scipy = ">=1.15.3, <2"
boto3 = ">=1.43.36, <2"
pyarrow = ">=24.0.0, <25"
scikit-learn = ">=1.7.2, <2"
tqdm = ">=4.68.3, <5"
matplotlib = ">=3.10.9, <4"
pillow = ">=12.2.0, <13"
nnaudio = ">=0.3.4, <0.4"
easydict = ">=1.13, <2"
fire = ">=0.7.1, <0.8"
pyyaml = ">=6.0.3, <7"
soundfile = ">=0.14.0, <0.15"
requests = ">=2.34.2, <3"
